name: Build PsyDoom Latest Develop

on:
  workflow_dispatch: # Allows manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true" # Clears the Node 20 deprecation warning

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Original Develop Branch
        uses: actions/checkout@v4
        with:
          repository: 'BodbDearg/PsyDoom'
          ref: 'develop'

      - name: Configure CMake
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Binary
        run: |
          cmake --build build --config Release

      - name: Debug and Find Executables
        run: |
          echo "=== SEARCHING FOR PSYDOOM.EXE ==="
          Get-ChildItem -Path . -Filter "PsyDoom.exe" -Recurase -ErrorAction SilentlyContinue | Select-Object FullName
          echo "=== CURRENT DIRECTORY STRUCTURE ==="
          Get-ChildItem -Directory
        shell: pwsh

      - name: Upload Latest Develop Executable
        uses: actions/upload-artifact@v4
        with:
          name: PsyDoom-Windows-Binary
          path: |
            **/PsyDoom.exe
            **/Release/PsyDoom.exe
          if-no-files-found: error # This will force the build to fail explicitly if it's missing
