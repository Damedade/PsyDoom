name: Build PsyDoom Latest Develop

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true" # Completely silences the Node.js 20 deprecation warning

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Original Develop Branch
        uses: actions/checkout@v4
        with:
          repository: 'BodbDearg/PsyDoom'
          ref: 'develop'

      # Forces CMake to output the finished exe directly into the main workspace folder
      - name: Configure CMake
        run: |
          cmake -B build -DCMAKE_RUNTIME_OUTPUT_DIRECTORY_RELEASE="${{ github.workspace }}" -DCMAKE_BUILD_TYPE=Release

      - name: Build Binary
        run: |
          cmake --build build --config Release

      - name: Verify File Location
        run: |
          echo "=== Checking Workspace Root ==="
          dir
        shell: pwsh

      - name: Upload Latest Develop Executable
        uses: actions/upload-artifact@v4
        with:
          name: PsyDoom-Windows-Binary
          path: PsyDoom.exe # Bypasses all folders! Looks directly at the workspace root.
